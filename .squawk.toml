# Squawk migration safety lint config for Haven.
# See https://squawkhq.com/docs/rules for the full rule list.
#
# Rules excluded here are stylistic only — every safety-relevant rule stays on.
# Anything squawk flags is treated as unsafe and held for manual approval.

excluded_rules = [
  "prefer-text-field",
  "prefer-timestamptz",
  "prefer-bigint-over-int",
  "prefer-identity",
  "prefer-robust-stmts",
  # CREATE INDEX CONCURRENTLY cannot run inside a transaction, and our
  # migrator runs every migration inside a transaction (atomic rollback
  # on failure). For migrations that genuinely need it (an index on a
  # large populated table), author them as an unsafe migration and apply
  # via `bun run db:migrate:unsafe` after read-and-confirm.
  "require-concurrent-index-creation",
]
